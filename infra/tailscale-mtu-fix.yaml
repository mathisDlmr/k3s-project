apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tailscale-mtu-fix
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: tailscale-mtu-fix
  template:
    metadata:
      labels:
        app: tailscale-mtu-fix
    spec:
      hostNetwork: true
      tolerations:
        - operator: Exists
      containers:
        - name: mtu-fix
          image: busybox:1.37
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              # WireGuard IPv6 overhead = 80 bytes. 1200 + 80 = 1280 = IPv6 minimum MTU.
              # This prevents MTU black holes on IPv6 Tailscale paths between nodes.
              while true; do
                if ip link show tailscale0 > /dev/null 2>&1; then
                  CURRENT=$(ip link show tailscale0 | grep -o 'mtu [0-9]*' | awk '{print $2}')
                  if [ "$CURRENT" != "1200" ]; then
                    ip link set tailscale0 mtu 1200
                    echo "tailscale0 MTU set to 1200 (was $CURRENT)"
                  fi
                fi
                sleep 30
              done
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              cpu: 10m
              memory: 16Mi
