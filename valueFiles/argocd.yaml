global:
  image:
    repository: ghcr.io/mathisdlmr/argocd
    tag: "v3.3.3"

configs:
  params:
    server.insecure: "true"
  cm:
    # Ignorer l'absence d'IP LoadBalancer sur les Ingress
    resource.customizations.health.networking.k8s.io_Ingress: |
      hs = {}
      hs.status = "Healthy"
      hs.message = "Ingress is Healthy (LB IP check ignored)"
      return hs

controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

server:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  # ingress:
  #   enabled: true
  #   annotations:
  #     kubernetes.io/ingress.class: traefik
  #     traefik.ingress.kubernetes.io/router.tls: "true"
  #   hostname: argocd.mdlmr.fr

repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
