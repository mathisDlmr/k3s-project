global:
  image:
    repository: ghcr.io/mathisdlmr/argocd
    tag: "v3.3.3"

controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

server:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.tls: "true"
    # hostname: argocd.mdlmr.fr

repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
