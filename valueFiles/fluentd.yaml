kind: DaemonSet

replicaCount: 1

env:
  - name: FLUENT_ELASTICSEARCH_HOST
    value: "elasticsearch-master.monitoring-v2.svc.cluster.local"
  - name: FLUENT_ELASTICSEARCH_PORT
    value: "9200"
  - name: FLUENT_ELASTICSEARCH_SCHEME
    value: "http"
  - name: FLUENT_ELASTICSEARCH_SSL_VERIFY
    value: "false"
  - name: FLUENT_ELASTICSEARCH_INDEX_NAME
    value: "fluentd"
  - name: FLUENT_ELASTICSEARCH_LOGSTASH_FORMAT
    value: "true"
  - name: FLUENT_ELASTICSEARCH_LOGSTASH_PREFIX
    value: "logstash"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

serviceAccount:
  create: true

rbac:
  create: true
