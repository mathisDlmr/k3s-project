config:
  address: "100.64.0.10"

env:
  vip_interface: "tailscale0"
  vip_arp: "true"
  lb_enable: "true"
  lb_port: "6443"
  vip_subnet: "32"
  cp_enable: "true"
  svc_enable: "true"
  svc_election: "true"
  vip_leaderelection: "true"
  prometheus_server: ":2112"

serviceAccount:
  create: true

tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/control-plane
    operator: Exists

securityContext:
  capabilities:
    add:
      - NET_ADMIN
      - NET_RAW
    drop:
      - ALL

podSecurityContext: {}
resources: {}
