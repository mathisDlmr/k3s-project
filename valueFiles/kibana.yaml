replicas: 1

elasticsearchHosts: "http://elasticsearch-master.monitoring-v2.svc.cluster.local:9200"

# Pas d'auth, utilisé uniquement in-cluster pour visualiser les logs depuis l'ES
kibanaConfig:
  kibana.yml: |
    server.host: "0.0.0.0"
    elasticsearch.hosts: ["http://elasticsearch-master.monitoring-v2.svc.cluster.local:9200"]
    xpack.security.enabled: false
    xpack.encryptedSavedObjects.encryptionKey: "a7f2e1b4c3d6e8f0a1b2c3d4e5f6a7b8"

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

service:
  type: ClusterIP
  port: 5601

healthCheckPath: "/api/status"
