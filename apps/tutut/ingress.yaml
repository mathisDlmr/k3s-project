apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tutut-app-ingress
  namespace: tutut
  labels:
    app: tutut
    component: app
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/rewrite-target: /
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
    - host: tutut.mdlmr.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tutut-app
                port:
                  name: http
  tls:
    - hosts:
        - tutut.mdlmr.fr

---
