apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
spec:
  sourceRepos:
    - "*"
  destinations:
    - name: "*"
      namespace: skiut
      server: "*"
    - name: "*"
      namespace: website
      server: "*"
    - name: "*"
      namespace: default
      server: "*"
    - name: "*"
      namespace: argocd
      server: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
