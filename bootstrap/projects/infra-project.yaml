apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
spec:
  sourceRepos:
    - "*"
  destinations:
    - name: "*"
      namespace: infra
      server: "*"
    - name: "*"
      namespace: kube-system
      server: "*"
    - name: "*"
      namespace: argocd
      server: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
